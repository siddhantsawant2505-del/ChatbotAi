      --tw-text-opacity: 1;
      color: rgb(55 65 81 / var(--tw-text-opacity));
    }

    #webcrumbs .hover\:shadow-md:hover {
      --tw-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
        0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --tw-shadow-colored: 0 4px 6px -1px var(--tw-shadow-color),
        0 2px 4px -2px var(--tw-shadow-color);
      box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000),
        var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
    }

    #webcrumbs .focus\:outline-none:focus {
      outline: 2px solid transparent;
      outline-offset: 2px;
    }

    #webcrumbs .focus\:ring-2:focus {
      --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
      --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color);
      box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow),
        var(--tw-shadow, 0 0 #0000);
    }

    #webcrumbs .focus\:ring-primary-500:focus {
      --tw-ring-opacity: 1;
      --tw-ring-color: rgb(115 65 255 / var(--tw-ring-opacity));
    }

    #webcrumbs :is(.group:hover .group-hover\:block) {
      display: block;
    }

    #webcrumbs :is(.group:hover .group-hover\:text-primary-600) {
      --tw-text-opacity: 1;
      color: rgb(99 27 255 / var(--tw-text-opacity));
    }

    body {
      line-height: inherit;
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-width: 100vw;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffffff, #d4d4d4);
    }
  </style>
</head>

<body>
  <div id="webcrumbs">
    <div class="w-[1920px] bg-gradient-to-b from-primary-50 to-white font-sans">
      <header class="flex items-center justify-between p-6 border-b border-gray-200">
        <div class="flex items-center"> <svg
            class="w-8 h-8 text-primary-600 transform hover:rotate-12 transition-transform duration-300"
            viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M9 3.5C5.683 3.5 3 6.183 3 9.5C3 12.817 5.683 15.5 9 15.5C10.0368 15.5 11.0044 15.2037 11.8289 14.6938C12.0358 14.5504 12.2311 14.3949 12.4142 14.2275L19.5 21.3132L21.3132 19.5L14.2275 12.4142C14.3949 12.2311 14.5504 12.0358 14.6938 11.8289C15.2037 11.0044 15.5 10.0368 15.5 9.5C15.5 6.183 12.817 3.5 9.5 3.5C9.33294 3.5 9.16589 3.5085 9 3.52548V3.5Z"
              fill="currentColor"></path>
          </svg>
          <h1 class="ml-3 text-xl font-bold text-primary-800">AI Chat Assistant</h1>
        </div>
        <div class="flex items-center space-x-4"> <button
            class="flex items-center px-3 py-2 text-sm bg-white border border-gray-300 rounded-md shadow-sm hover:shadow-md transition-shadow duration-200">
            <span class="material-symbols-outlined text-gray-600 mr-2">help_outline</span> Help </button> <button
            class="flex items-center px-3 py-2 text-sm bg-white border border-gray-300 rounded-md shadow-sm hover:shadow-md transition-shadow duration-200">
            <span class="material-symbols-outlined text-gray-600 mr-2">history</span> History </button>
          <div
            class="relative h-8 w-8 rounded-full bg-primary-600 flex items-center justify-center text-white cursor-pointer hover:bg-primary-700 transition-colors duration-200"
            id="profile-icon">
            US
            <div class="absolute right-0 top-full mt-2 w-48 bg-white shadow-lg rounded-md overflow-hidden z-10 hidden"
              id="dropdown">
              <div class="py-2">
                <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center">
                  <span class="material-symbols-outlined mr-2 text-gray-500">account_circle</span> Profile
                </button>
                <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center">
                  <span class="material-symbols-outlined mr-2 text-gray-500">settings</span> Settings
                </button>
                <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center">
                  <span class="material-symbols-outlined mr-2 text-gray-500">language</span> Language
                </button>
                <div class="border-t border-gray-200 my-1"></div>
                <button class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100 flex items-center">
                  <span class="material-symbols-outlined mr-2">logout</span> Sign out
                </button>
              </div>
            </div>
          </div>

          <script>
            const profileIcon = document.getElementById('profile-icon');
            const dropdown = document.getElementById('dropdown');

            profileIcon.addEventListener('click', (e) => {
              dropdown.classList.toggle('hidden');
              e.stopPropagation();
            });

            document.addEventListener('click', (e) => {
              if (!profileIcon.contains(e.target)) {
                dropdown.classList.add('hidden');
              }
            });
          </script>

        </div>
      </header>
      <main class="flex h-[calc(100vh-64px)]">
        <aside class="w-[260px] p-4 border-r border-gray-200 overflow-y-auto"> <button
            class="w-full flex items-center justify-center py-3 px-4 bg-primary-600 text-white rounded-md hover:bg-primary-700 transition-all duration-200 shadow-sm hover:shadow-md mb-4">
            <span class="material-symbols-outlined mr-2">add</span> New Chat </button>
          <div class="mt-6">
            <h3 class="text-xs font-semibold text-gray-500 mb-3 uppercase">Recent conversations</h3>
          </div>
        </aside>
        <div class="flex-1 flex flex-col">
          <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="flex items-start mb-8">
              <div class="p-2 rounded-lg bg-primary-100 mr-4"> <svg class="w-8 h-8 text-primary-600" viewBox="0 0 24 24"
                  fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M12 2C6.477 2 2 6.477 2 12C2 17.523 6.477 22 12 22C17.523 22 22 17.523 22 12C22 6.477 17.523 2 12 2ZM12 7C12.552 7 13 7.448 13 8C13 8.552 12.552 9 12 9C11.448 9 11 8.552 11 8C11 7.448 11.448 7 12 7ZM13 17H11V10H13V17Z"
                    fill="currentColor"></path>
                </svg> </div>
              <div class="flex-1">
                <div class="flex items-center mb-2">
                  <h3 class="font-semibold text-primary-800">AI Assistant</h3> <span
                    class="ml-2 px-2 py-0.5 text-xs rounded-full bg-green-100 text-green-800">Online</span>
                </div>
                <p class="text-gray-700">Hello! I&#x27;m your AI assistant. How can I help you today?</p>
                
                <div class="flex items-center mb-2">
                {% if chat %}
                <h3 class="font-semibold text-primary-800">You</h3>
                </div>
                <p class="text-gray-700">{{ chat.user_input }}</p>
                <div class="flex items-center mb-2">
                  <h3 class="font-semibold text-primary-800">AI Assistant</h3>
                </div>
                <p class="text-gray-700">{{ chat.ai_response }}</p>
                {% else %}
                 <p>No messages yet. Start chatting!</p>
                {% endif %}
            </div>

            <div class="border-t border-gray-200 p-4">
              <div class="relative flex items-center w-full">
                <form method="post" onsubmit="event.preventDefault(); sendMessage();">
                {% csrf_token %}
                 <!-- Textarea for message input -->
                 <textarea id="userInput" class="w-full p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 resize-none h-[60px] bg-white" placeholder="Type your message here...">
                 </textarea>

                <!-- Buttons for Upload and Send -->
                <div class="absolute right-4 flex items-center space-x-2">
                  <button
                    class="flex items-center px-3 py-1.5 text-xs bg-blue-50 border border-blue-200 rounded-md hover:bg-blue-100 transition-colors duration-200">
                    <span class="material-symbols-outlined text-blue-600 mr-1 text-sm">mic</span>
                  </button>
                  <!-- Upload File Button -->
                  <button class="p-2 hover:bg-gray-100 rounded-full transition-colors duration-200">
                    <span class="material-symbols-outlined text-gray-500 hover:text-gray-700">attach_file</span>
                  </button>

                   <!-- Send Message Button -->
                  <button type="submit"class="p-2 bg-primary-600 text-white rounded-full hover:bg-primary-700 transition-colors duration-200 flex items-center justify-center">
                    <span class="material-symbols-outlined">send</span>
                  </button>
                </form>
                <script>
                  function sendMessage() {
                    const userInput = document.getElementById('userInput').value;
                    if (!userInput.trim()) return;

                    // Append User Message to UI
                    const chatHistory = document.getElementById('chat-history');
                    chatHistory.innerHTML += `<p><b>You:</b> ${userInput}</p>`;

                    // Clear Input
                    document.getElementById('userInput').value = '';

                    // Simulate AI Thinking with a Delay
                    chatHistory.innerHTML += `<p><b>AI:</b> <span id="ai-thinking">Thinking...</span></p>`;

                    // Add a delay before displaying the AI response
                    setTimeout(() => {
                    fetch('/chat/', {
                       method: 'POST',
                       headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                       body: JSON.stringify({ message: userInput }),
                    })
                    .then(response => response.json())
                    .then(data => {
                       document.getElementById('ai-thinking').innerText = data.response;
                    })
                    .catch(error => {
                      console.error('Error:', error);
                      document.getElementById('ai-thinking').innerText = "Sorry, something went wrong.";
                    });
                  }, 2000); // 2-second delay to simulate thinking
                }

                 // CSRF Token Helper for Security
                function getCSRFToken() {
                  return document.querySelector('input[name="csrfmiddlewaretoken"]').value;
                }
                </script>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
