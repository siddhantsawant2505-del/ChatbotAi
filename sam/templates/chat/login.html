{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Chat Assistant</title>
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body>
    <div class="min-h-screen bg-gradient-to-b from-primary-50 to-white flex items-center justify-center">
        <div class="w-[400px] bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-4xl font-title text-center text-purple-600 mb-6 tracking-wide">Login</h1>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="text-red-600 text-center mb-4">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-1">
                    <label for="username" class="block text-lg font-medium">Username</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-2 text-purple-300">person</span>
                        <input id="username" name="username" type="text" required
                            class="w-full px-10 py-3 border border-purple-300 rounded-md focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-300/50 transition-all duration-300"
                            placeholder="Your username">
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label for="password" class="block text-lg font-medium">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-2 text-purple-300">lock</span>
                        <input id="password" name="password" type="password" required
                            class="w-full px-10 py-3 border border-purple-300 rounded-md focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-300/50 transition-all duration-300"
                            placeholder="Your password">
                    </div>
                </div>

                <button type="submit"
                    class="w-full px-4 py-3 bg-purple-700 text-white rounded-full hover:bg-purple-600 focus:bg-purple-800 transition-all duration-300">
                    Login
                </button>
            </form>

            <p class="text-sm mt-4 text-center">
                Don't have an account? <a href="{% url 'signup' %}" class="text-purple-600 hover:underline">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
