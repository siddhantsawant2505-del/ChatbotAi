<!DOCTYPE html>
<html lang="en">
    {% load static %}
    <head>
        <meta charset="UTF-8">
        <title>Ai Genius Games</title>
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
        <link rel="stylesheet" href="{% static 'css/style1.css' %}">
    </head>

    <body>
    
        <body style="background: url('{% static "images/GAME.png" %}') no-repeat center center fixed; background-size: cover;">
        <div id="container">
            <div id="score">
                Score : <span id="scorevalue">0</span>
            </div>
            <div id="correct">
                Correct
            </div>
            <div id="wrong">
                Try Again
            </div>
            <div id="question">

            </div>
            <div id="instruction">
                Click on the Correct Answer
            </div>
            <div id="choices">
                <div id="box1" class="box"></div>
                <div id="box2" class="box"></div>
                <div id="box3" class="box"></div>
                <div id="box4" class="box"></div>
            </div>
            <div id="startreset">
                Start Game
            </div>
            <div id="timeremaining">
                Time remaining :
                <span id="timeremainingvalue">60</span>
                sec
            </div>
            <div id="gameOver">
            </div>
        </div>

        <!-- script -->
        <script type="text/javascript" src="{% static 'js/script.js' %}"></script>
    </body>
</html>
